services:
  api:
    build:
      context: .
    image: endpoint-identity-control-plane-api:local
    ports:
      - "127.0.0.1:8000:8000"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
